<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>実家は寮母?4人の美少女とドキドキ新生活!</title>
<style>
  :root{
    --paper:#F7F1E6;
    --paper-deep:#EFE5D2;
    --wood:#8B5E3C;
    --wood-deep:#6B4429;
    --indigo:#2F3B4C;
    --indigo-deep:#1E2733;
    --sakura:#F0A8B4;
    --sakura-deep:#D9818F;
    --moss:#7C9473;
    --gold:#C99A4B;
    --ink:#3A2E22;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    overscroll-behavior:none; touch-action:manipulation;
    background:#000;
  }
  body{
    font-family:"Zen Old Mincho","Noto Serif JP",serif;
    color:var(--ink);
    user-select:none;
  }
  #app{
    position:relative;
    width:100%;
    height:100vh;
    height:100dvh;
    max-width:520px;
    margin:0 auto;
    overflow:hidden;
    background:var(--paper);
    box-shadow:0 0 40px rgba(0,0,0,.5);
  }

  /* ---------- 共通: 背景レイヤー ---------- */
  .screen{
    position:absolute; inset:0;
    display:none;
    flex-direction:column;
    width:100%; height:100%;
  }
  .screen.active{display:flex;}

  .bg-layer{
    position:absolute; inset:0;
    transition:background 1.2s ease, opacity 1.2s ease;
    z-index:0;
  }
  .bg-day{background:linear-gradient(180deg,#BFE3F0 0%, #EAF3E3 45%, #F7F1E6 100%);}
  .bg-evening{background:linear-gradient(180deg,#F6C9A0 0%, #F0A8A0 45%, #EFE0CB 100%);}
  .bg-room{background:linear-gradient(180deg,#F3E6CE 0%, #EAD7B3 55%, #DDC396 100%);}
  .bg-night{background:linear-gradient(180deg,#1B2436 0%, #2B3650 55%, #3C4660 100%);}
  .bg-night .star{position:absolute; width:3px; height:3px; background:#fff; border-radius:50%; opacity:.8; animation:twinkle 2.6s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.25;} 50%{opacity:.95;}}

  .petal{
    position:absolute; top:-10%;
    width:10px; height:10px; border-radius:50% 0 50% 50%;
    background:var(--sakura);
    opacity:.85;
    animation:fall linear infinite;
    z-index:1;
  }
  @keyframes fall{
    0%{transform:translateY(0) translateX(0) rotate(0deg); opacity:.9;}
    100%{transform:translateY(115vh) translateX(40px) rotate(360deg); opacity:.2;}
  }
  @media (prefers-reduced-motion: reduce){
    .petal{animation:none; display:none;}
    .bg-night .star{animation:none;}
  }

  /* ---------- タイトル画面 ---------- */
  #screen-title{justify-content:flex-end; align-items:center;}
  #titleImg{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:center top; z-index:0;
  }
  .title-shade{
    position:absolute; left:0; right:0; bottom:0; height:38%;
    background:linear-gradient(180deg, rgba(30,20,10,0) 0%, rgba(30,20,10,.55) 70%, rgba(30,20,10,.75) 100%);
    z-index:1;
  }
  #titleStart{
    position:relative; z-index:2; margin-bottom:6.5%;
    font-family:"Shippori Mincho",serif;
  }
  .credit{
    position:relative; z-index:2; color:#fff8ec; opacity:.75; font-size:.68rem; margin-bottom:1.1rem; letter-spacing:.05em;
  }

  /* ---------- 木札ボタン ---------- */
  .plaque-btn{
    display:inline-flex; align-items:center; justify-content:center;
    min-width:180px; padding:.85em 1.6em;
    background:linear-gradient(180deg,#B98148 0%, var(--wood) 55%, var(--wood-deep) 100%);
    border:2px solid #5A3A20;
    border-radius:10px;
    color:#FFF6E6;
    font-size:1.05rem;
    letter-spacing:.08em;
    box-shadow:0 4px 0 #4A2E18, 0 8px 14px rgba(0,0,0,.35);
    text-shadow:0 1px 2px rgba(0,0,0,.4);
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .plaque-btn:active{transform:translateY(3px); box-shadow:0 1px 0 #4A2E18, 0 3px 8px rgba(0,0,0,.3);}

  /* ---------- 名前入力画面 ---------- */
  #screen-name{justify-content:center; align-items:center;}
  .name-card{
    position:relative; z-index:2; width:84%; max-width:380px;
    background:rgba(255,251,242,.94);
    border:1px solid #E0CFAE;
    border-radius:18px;
    padding:2rem 1.5rem 1.7rem;
    text-align:center;
    box-shadow:0 10px 30px rgba(60,40,20,.18);
  }
  .name-card h2{
    font-family:"Shippori Mincho",serif;
    font-size:1.18rem; margin:0 0 .4rem; color:var(--indigo);
  }
  .name-card p{font-size:.82rem; color:#7A6B55; margin:0 0 1.3rem;}
  .name-input{
    width:100%; padding:.75em 1em; font-size:1rem;
    font-family:"Zen Old Mincho",serif;
    border:1.5px solid #CBB58C; border-radius:10px;
    background:#fff; color:var(--ink); margin-bottom:1.4rem;
    text-align:center;
  }
  .name-input:focus{outline:2px solid var(--sakura-deep);}

  /* ---------- ストーリー画面 ---------- */
  #screen-story{}
  .topbar{
    position:absolute; top:0; left:0; right:0; z-index:5;
    display:flex; justify-content:flex-end;
    padding:.6rem .7rem;
  }
  .icon-btn{
    width:34px; height:34px; border-radius:50%;
    background:rgba(40,30,20,.38);
    color:#fff; border:none; font-size:1rem;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(2px);
  }

  .char-frame{
    position:absolute; left:50%; top:9%;
    transform:translateX(-50%) rotate(-1.4deg);
    width:58%; max-width:230px;
    z-index:2;
    opacity:0; transition:opacity .35s ease, transform .35s ease;
    pointer-events:none;
  }
  .char-frame.show{opacity:1; transform:translateX(-50%) rotate(-1.4deg) translateY(0);}
  .char-frame img{
    display:block; width:100%; border-radius:6px;
    border:7px solid #FFFCF4;
    box-shadow:0 10px 22px rgba(40,25,10,.32);
  }
  .char-frame::after{
    content:"";
    position:absolute; top:-9px; left:50%; transform:translateX(-50%) rotate(8deg);
    width:26px; height:14px; border-radius:3px;
    background:rgba(217,129,143,.85);
    box-shadow:0 2px 3px rgba(0,0,0,.25);
  }

  .narration-box{
    position:absolute; left:6%; right:6%; top:14%;
    z-index:3; text-align:center;
    font-size:.92rem; line-height:1.85;
    color:var(--paper);
    text-shadow:0 1px 6px rgba(0,0,0,.55), 0 0 2px rgba(0,0,0,.4);
    display:none;
  }
  .bg-day ~ .narration-box, .bg-room ~ .narration-box{color:#3A2E22; text-shadow:0 1px 1px rgba(255,255,255,.5);}

  .dialogue-wrap{
    position:absolute; left:0; right:0; bottom:0; z-index:4;
    padding:0 4% 4%;
  }
  .shoji{
    position:relative;
    background:rgba(250,245,233,.94);
    border:1px solid #D8C39C;
    border-radius:16px;
    padding:1.1rem 1.2rem 1.25rem;
    min-height:118px;
    box-shadow:0 -4px 24px rgba(40,25,10,.22);
    background-image:
      linear-gradient(rgba(216,195,156,.35) 1px, transparent 1px),
      linear-gradient(90deg, rgba(216,195,156,.35) 1px, transparent 1px);
    background-size:33% 100%, 100% 100%;
  }
  .name-tab{
    position:absolute; top:-19px; left:14px;
    display:flex; align-items:center; gap:.45rem;
    background:var(--indigo);
    color:#FFF6E6;
    padding:.3rem .8rem .3rem .35rem;
    border-radius:20px;
    font-size:.82rem;
    letter-spacing:.05em;
    box-shadow:0 3px 8px rgba(0,0,0,.25);
  }
  .name-tab img{
    width:24px; height:24px; border-radius:50%; object-fit:cover;
    border:1.5px solid #FFF6E6;
  }
  .dlg-text{
    font-size:.97rem; line-height:1.82; min-height:4.6em;
    color:var(--ink);
    white-space:pre-wrap;
  }
  .next-cue{
    position:absolute; right:16px; bottom:12px;
    font-size:.78rem; color:#A8916C;
    animation:bob 1.3s ease-in-out infinite;
  }
  @keyframes bob{0%,100%{transform:translateY(0);} 50%{transform:translateY(4px);}}

  .choice-wrap{
    position:absolute; left:5%; right:5%; bottom:5%;
    z-index:6; display:flex; flex-direction:column; gap:.6rem;
  }
  .choice-prompt{
    text-align:center; color:#FFF6E6; font-size:.88rem; margin-bottom:.3rem;
    text-shadow:0 1px 5px rgba(0,0,0,.6);
  }
  .choice-btn{
    display:block; width:100%; text-align:center;
    padding:.78em .8em; font-size:.92rem;
    font-family:"Zen Old Mincho",serif;
    background:linear-gradient(180deg,#FBF4E4 0%, #F1E3C4 100%);
    border:1.5px solid #C9AD7C;
    border-radius:10px;
    color:var(--ink);
    box-shadow:0 3px 0 #B8986A, 0 6px 12px rgba(0,0,0,.25);
    transition:transform .1s ease;
  }
  .choice-btn:active{transform:translateY(2px);}

  /* ---------- エンディング画面 ---------- */
  #screen-end{justify-content:center; align-items:center; background:var(--indigo-deep);}
  .end-card{
    position:relative; z-index:2; width:86%; max-width:380px;
    text-align:center; color:#FFF6E6;
  }
  .end-frame{
    width:62%; margin:0 auto 1.1rem; border-radius:8px;
    border:7px solid #FFFCF4; box-shadow:0 12px 26px rgba(0,0,0,.4);
    overflow:hidden;
  }
  .end-frame img{display:block; width:100%;}
  .end-card h2{
    font-family:"Shippori Mincho",serif; font-size:1.25rem; margin:.2rem 0 .8rem;
    color:#F3D9C4; white-space:pre-line;
  }
  .petal-layer{position:absolute; inset:0; z-index:1; overflow:hidden; pointer-events:none;}
  .petal-layer .petal{position:absolute; top:-6%;}
  .end-card p{font-size:.85rem; line-height:1.8; opacity:.92; margin:0 0 1.5rem; white-space:pre-wrap;}

  .hidden{display:none !important;}
</style>
</head>

/* ===================== 状態 ===================== */
const state = { playerName:"陽斗", points:{shizuku:0,himari:0,rei:0,riko:0}, cur:null };

/* ===================== DOM ===================== */
const $ = (id)=>document.getElementById(id);
const screens = { title:$("screen-title"), name:$("screen-name"), story:$("screen-story"), end:$("screen-end") };
const bgLayer = $("bgLayer");
const charFrame = $("charFrame");
const charImg = $("charImg");
const dlgText = $("dlgText");
const nameTab = $("nameTab");
const nameTabImg = $("nameTabImg");
const nameTabText = $("nameTabText");
const nextCue = $("nextCue");
const choiceWrap = $("choiceWrap");
const choicePrompt = $("choicePrompt");
const dialogueWrap = $("dialogueWrap");

function showScreen(key){
  Object.values(screens).forEach(s=>s.classList.remove("active"));
  screens[key].classList.add("active");
}

function processText(t){
  return t.split("{name}").join(state.playerName || "陽斗");
}

function setBg(key){
  bgLayer.innerHTML = "";
  bgLayer.className = "bg-layer bg-" + key;
  if(key === "night"){
    for(let i=0;i<10;i++){
      const s = document.createElement("div");
      s.className = "star";
      s.style.left = (Math.random()*96)+"%";
      s.style.top = (Math.random()*55)+"%";
      s.style.animationDelay = (Math.random()*2.6)+"s";
      bgLayer.appendChild(s);
    }
  }
}

function setChar(speaker, show){
  if(show !== false && speaker && IMAGES["body_"+speaker]){
    charImg.src = IMAGES["body_"+speaker];
    charFrame.classList.add("show");
  } else {
    charFrame.classList.remove("show");
  }
}

function setDialogue(speaker, text){
  if(speaker && NAMES[speaker]){
    nameTab.classList.remove("hidden");
    nameTabImg.style.display = "block";
    nameTabImg.src = IMAGES["face_"+speaker];
    nameTabText.textContent = NAMES[speaker];
    dlgText.classList.remove("narration");
  } else if(speaker === "pc"){
    nameTab.classList.remove("hidden");
    nameTabImg.style.display = "none";
    nameTabText.textContent = state.playerName || "陽斗";
    dlgText.classList.remove("narration");
  } else {
    nameTab.classList.add("hidden");
    dlgText.classList.add("narration");
  }
  dlgText.textContent = processText(text);
}

function renderChoices(node){
  dialogueWrap.classList.add("hidden");
  choiceWrap.classList.remove("hidden");
  choicePrompt.textContent = node.prompt || "";
  choiceWrap.querySelectorAll(".choice-btn").forEach(b=>b.remove());
  node.options.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = opt.label;
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      if(opt.pts){
        Object.keys(opt.pts).forEach(k=>{ state.points[k] = (state.points[k]||0) + opt.pts[k]; });
      }
      render(opt.next);
    });
    choiceWrap.appendChild(btn);
  });
}

function hideChoices(){
  dialogueWrap.classList.remove("hidden");
  choiceWrap.classList.add("hidden");
}

function showEnd(node){
  showScreen("end");
  $("endImg").src = IMAGES[node.img] || IMAGES.title;
  $("endTitle").textContent = node.title;
  $("endText").textContent = processText(node.text);
}

function render(id){
  const node = SCN[id];
  if(!node){ console.error("missing scenario node:", id); return; }

  if(node.type === "route"){
    const order = ["shizuku","himari","rei","riko"];
    let best = null, bestVal = -1, tie = false;
    order.forEach(k=>{
      const v = state.points[k] || 0;
      if(v > bestVal){ bestVal = v; best = k; tie = false; }
      else if(v === bestVal){ tie = true; }
    });
    if(bestVal <= 0 || tie){ render("end_group"); }
    else { render("route_" + best + "_start"); }
    return;
  }

  state.cur = id;

  if(node.type === "end"){ showEnd(node); return; }

  showScreen("story");
  setBg(node.bg || "day");
  setChar(node.speaker, node.showChar);
  setDialogue(node.speaker, node.text);

  if(node.type === "choice"){
    renderChoices(node);
  } else {
    hideChoices();
    nextCue.style.display = "block";
  }
}

/* ===================== イベント ===================== */
$("titleStart").addEventListener("click", ()=> showScreen("name"));

$("nameStart").addEventListener("click", ()=>{
  const v = $("nameInput").value.trim();
  state.playerName = v.length ? v : "陽斗";
  state.points = {shizuku:0,himari:0,rei:0,riko:0};
  render("p1");
});

$("toTitleBtn").addEventListener("click", (e)=>{
  e.stopPropagation();
  if(confirm("タイトルに戻りますか?(これまでの選択はリセットされます)")){
    state.points = {shizuku:0,himari:0,rei:0,riko:0};
    showScreen("title");
  }
});

$("screen-story").addEventListener("click", (e)=>{
  if(e.target.closest(".choice-btn") || e.target.closest(".icon-btn")) return;
  const node = SCN[state.cur];
  if(node && node.type === "line"){ render(node.next); }
});

$("endRestart").addEventListener("click", ()=>{
  state.points = {shizuku:0,himari:0,rei:0,riko:0};
  showScreen("title");
});

$("nameInput").addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){ $("nameStart").click(); }
});

</script>
